<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZRI SHAFWAN ZAKKIR</title></title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --cyan: #00eaff;
    --dark: #050a0e;
    --darker: #020609;
    --card-bg: rgba(0, 255, 136, 0.04);
    --border: rgba(0, 255, 136, 0.2);
    --text-dim: rgba(0, 255, 136, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid bg */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ---- HEADER ---- */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }

  .glitch-wrap {
    position: relative;
    display: inline-block;
  }

  .main-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.2rem, 6vw, 4.8rem);
    font-weight: 900;
    color: var(--green);
    letter-spacing: 0.12em;
    text-shadow:
      0 0 10px rgba(0,255,136,0.8),
      0 0 30px rgba(0,255,136,0.4),
      0 0 60px rgba(0,255,136,0.2);
    animation: flicker 6s infinite;
    position: relative;
  }

  .main-title::before,
  .main-title::after {
    content: 'AZRI MINTA IPHONE';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .main-title::before {
    color: #ff003c;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    animation: glitch1 3s infinite;
    opacity: 0.7;
  }

  .main-title::after {
    color: var(--cyan);
    clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    animation: glitch2 3s infinite;
    opacity: 0.7;
  }

  @keyframes glitch1 {
    0%, 94%, 100% { transform: none; opacity: 0; }
    95% { transform: translateX(-4px); opacity: 0.7; }
    97% { transform: translateX(4px); opacity: 0.7; }
    99% { transform: translateX(-2px); opacity: 0.7; }
  }

  @keyframes glitch2 {
    0%, 90%, 100% { transform: none; opacity: 0; }
    91% { transform: translateX(4px); opacity: 0.7; }
    93% { transform: translateX(-4px); opacity: 0.7; }
    95% { transform: none; opacity: 0.7; }
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.4em;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .subtitle span {
    color: var(--cyan);
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 32px auto;
    max-width: 600px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }

  .divider-icon {
    color: var(--green);
    font-size: 1.2rem;
    letter-spacing: 4px;
    text-shadow: 0 0 8px var(--green);
  }

  /* ---- STATUS BAR ---- */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 48px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.cyan { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

  @keyframes pulse {
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:0.5; transform:scale(0.8);}
  }

  /* ---- GALLERY SECTION ---- */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--darker);
    background: var(--green);
    padding: 3px 10px;
    letter-spacing: 0.2em;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- UPLOAD ZONE ---- */
  .upload-zone {
    border: 1.5px dashed rgba(0,255,136,0.35);
    border-radius: 4px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 32px;
    transition: all 0.3s;
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 60%);
    animation: rotateBg 8s linear infinite;
    pointer-events: none;
  }

  @keyframes rotateBg { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .upload-zone:hover {
    border-color: var(--green);
    background: rgba(0,255,136,0.07);
    box-shadow: 0 0 20px rgba(0,255,136,0.1), inset 0 0 20px rgba(0,255,136,0.05);
  }

  .upload-zone.drag-over {
    border-color: var(--cyan);
    box-shadow: 0 0 30px rgba(0,234,255,0.2);
  }

  .upload-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .upload-text {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .upload-text strong { color: var(--green); }

  #fileInput { display: none; }

  /* ---- PHOTO GRID ---- */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .photo-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border: 1px solid var(--border);
    background: rgba(0,255,136,0.02);
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

  .photo-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 2;
  }

  .photo-item:hover::before { opacity: 1; }

  .photo-item:hover {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(0,255,136,0.2), 0 0 40px rgba(0,255,136,0.1);
    transform: scale(1.02);
    z-index: 5;
  }

  .photo-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.85) saturate(1.1);
    transition: filter 0.3s;
  }

  .photo-item:hover img { filter: brightness(1) saturate(1.3); }

  .photo-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(5,10,14,0.9));
    padding: 24px 10px 10px;
    transform: translateY(100%);
    transition: transform 0.3s;
    z-index: 3;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .photo-item:hover .photo-overlay { transform: translateY(0); }

  .photo-num {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .photo-delete {
    background: rgba(255,0,60,0.2);
    border: 1px solid rgba(255,0,60,0.5);
    color: #ff003c;
    font-size: 0.65rem;
    font-family: 'Share Tech Mono', monospace;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }

  .photo-delete:hover {
    background: rgba(255,0,60,0.4);
    box-shadow: 0 0 10px rgba(255,0,60,0.3);
  }

  /* Corner decorations */
  .photo-item .corner {
    position: absolute;
    width: 12px; height: 12px;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .photo-item:hover .corner { opacity: 1; }
  .corner.tl { top: 5px; left: 5px; border-top: 1.5px solid var(--green); border-left: 1.5px solid var(--green); }
  .corner.tr { top: 5px; right: 5px; border-top: 1.5px solid var(--green); border-right: 1.5px solid var(--green); }
  .corner.bl { bottom: 5px; left: 5px; border-bottom: 1.5px solid var(--green); border-left: 1.5px solid var(--green); }
  .corner.br { bottom: 5px; right: 5px; border-bottom: 1.5px solid var(--green); border-right: 1.5px solid var(--green); }

  /* ---- COUNTER ---- */
  .counter {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 16px;
    letter-spacing: 0.15em;
  }

  .counter span { color: var(--green); }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    display: none;
  }

  /* ---- LIGHTBOX ---- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(2,6,9,0.97);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 40px;
  }

  .lightbox.open { display: flex; }

  .lightbox-img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(0,255,136,0.15), 0 0 100px rgba(0,255,136,0.07);
  }

  .lightbox-close {
    position: fixed;
    top: 20px; right: 24px;
    background: none;
    border: 1px solid var(--border);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.2em;
    transition: all 0.2s;
  }

  .lightbox-close:hover {
    background: rgba(0,255,136,0.1);
    box-shadow: 0 0 15px rgba(0,255,136,0.2);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--darker); }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.3); }
  ::-webkit-scrollbar-thumb:hover { background: var(--green); }

  /* Scan animation on load */
  .scan-line {
    position: fixed;
    top: -2px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    box-shadow: 0 0 10px var(--green);
    animation: scan 4s linear infinite;
    z-index: 9998;
    opacity: 0.6;
  }

  @keyframes scan { from{top:-2px} to{top:100vh} }
</style>
</head>
<body>

<div class="scan-line"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">[ ESC ]</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<div class="container">
  <!-- HEADER -->
  <header>
    <div class="glitch-wrap">
      <h1 class="main-title">johan fikir dia lucu</h1>
    </div>
    <p class="subtitle">// PHOTO GALLERY SYSTEM v2.0 <span>_</span></p>

    <div class="divider">
      <div class="divider-icon">◈ ◈ ◈</div>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span>SYSTEM ONLINE</span>
      </div>
      <div class="status-item">
        <div class="status-dot cyan"></div>
        <span>GALLERY ACTIVE</span>
      </div>
      <div class="status-item">
        <div class="status-dot"></div>
        <span id="photoCountStatus">0 FILES LOADED</span>
      </div>
    </div>
  </header>

  <!-- GALLERY -->
  <div class="section-header">
    <div class="section-tag">// GALLERY</div>
    <div class="section-line"></div>
  </div>

  <div class="counter">TOTAL: <span id="photoCount">0</span> FOTO DIMUAT</div>

  <!-- UPLOAD ZONE -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">
    <span class="upload-icon">⬡</span>
    <div class="upload-text">
      <strong>KLIK ATAU DRAG & DROP</strong><br>
      untuk menambah foto<br>
      <span style="font-size:0.7rem; opacity:0.5;">JPG · PNG · WEBP · GIF · HEIC</span>
    </div>
  </div>

  <!-- PHOTO GRID -->
  <div class="photo-grid" id="photoGrid"></div>
  <div class="empty-state" id="emptyState">[ https://ibb.co.com/TqH9XQVgl ]</div>
</div>

<script>
  let photos = [];

  const grid = document.getElementById('photoGrid');
  const countEl = document.getElementById('photoCount');
  const statusEl = document.getElementById('photoCountStatus');
  const emptyEl = document.getElementById('emptyState');
  const zone = document.getElementById('uploadZone');

  // Drag & drop
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => addPhoto(e.target.result, file.name);
      reader.readAsDataURL(file);
    });
  }

  function addPhoto(src, name) {
    const idx = photos.length;
    photos.push({ src, name });

    const item = document.createElement('div');
    item.className = 'photo-item';
    item.dataset.idx = idx;
    item.innerHTML = `
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <img src="${src}" alt="${name}" onclick="openLightbox(${idx})">
      <div class="photo-overlay">
        <span class="photo-num">IMG_${String(idx+1).padStart(3,'0')}</span>
        <button class="photo-delete" onclick="deletePhoto(${idx}, this.closest('.photo-item'))">[ DEL ]</button>
      </div>
    `;

    grid.appendChild(item);
    updateCount();
  }

  function deletePhoto(idx, el) {
    photos[idx] = null;
    el.style.animation = 'fadeIn 0.3s reverse forwards';
    setTimeout(() => el.remove(), 280);
    setTimeout(updateCount, 300);
  }

  function updateCount() {
    const total = grid.querySelectorAll('.photo-item').length;
    countEl.textContent = total;
    statusEl.textContent = total + ' FILES LOADED';
    emptyEl.style.display = total === 0 ? 'block' : 'none';
  }

  function openLightbox(idx) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = photos[idx].src;
    lb.classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
